version: 2
updates:
  - package-ecosystem: gomod
    directory: "/src/cmd/app"
    schedule: { interval: weekly }
    groups:
      go-deps:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: "/src/internal"
    schedule: { interval: weekly }
  - package-ecosystem: gomod
    directory: "/src/pkg"
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
