version: 2

before:
  hooks:
    - go work sync
    - go mod tidy -C ./src/cmd/app

builds:
  - id: app
    main: ./src/cmd/app
    binary: app
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: [-s, -w, -X main.version={{.Version}}, -X main.commit={{.Commit}}]
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]
