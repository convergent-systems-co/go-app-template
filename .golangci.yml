version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - gocyclo
    - revive
    - misspell
    - unparam
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, gosec, unparam]
